<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QianYuan1437 · 站点导航</title>
  <style>
    :root{
      --bg:#edf1fb;
      --ink:#0f1b33;
      --muted:#5f7394;
      --line:#c8d5ee;
      --chip:#e9effb;
      --chip-active:#0f2554;
      --hero-a:#1e8f8f;
      --hero-b:#31a8ea;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:"Segoe UI",system-ui,-apple-system,sans-serif;background:radial-gradient(900px 420px at 100% -10%,#c6f0d7 0%,transparent 60%),var(--bg);color:var(--ink)}
    .wrap{width:min(1450px,90vw);margin:0 auto;padding:34px 0 56px}

    .hero{background:linear-gradient(135deg,var(--hero-a),var(--hero-b));border-radius:34px;padding:46px 48px;color:#f6fbff;box-shadow:0 12px 34px rgba(18,67,123,.22)}
    .hero h1{font-size:68px;line-height:1.03;letter-spacing:.2px;font-weight:800}
    .hero p{margin-top:18px;font-size:37px;opacity:.95;line-height:1.35}
    .hero .meta{margin-top:16px;font-size:30px;opacity:.9}

    .section{margin-top:36px}
    .section-title{display:flex;align-items:center;gap:10px;font-size:44px;font-weight:800;color:#102243}
    .chips{display:flex;gap:12px;flex-wrap:wrap;margin-top:16px}
    .chip{border:2px solid var(--line);background:var(--chip);color:#223d68;border-radius:999px;padding:10px 18px;font-size:25px;font-weight:700;cursor:pointer}
    .chip.active{background:var(--chip-active);border-color:var(--chip-active);color:#fff}

    .grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px;margin-top:18px}
    .card{display:block;background:#fff;border:2px solid var(--line);border-radius:22px;overflow:hidden;text-decoration:none;color:inherit;transition:transform .18s,border-color .18s,box-shadow .18s}
    .card:hover{transform:translateY(-4px);border-color:#95b3e8;box-shadow:0 12px 24px rgba(24,45,86,.12)}
    .card-top{display:flex;justify-content:space-between;align-items:center;padding:18px 22px;background:linear-gradient(90deg,#d3e8f8,#d3efd9);min-height:86px}
    .icon{font-size:34px}
    .tag{border:2px solid #9dc3e8;border-radius:999px;padding:6px 12px;font-size:24px;color:#26517f;background:#f5fbff;font-weight:700}
    .card-body{padding:20px 22px 24px}
    .card h3{font-size:45px;line-height:1.15;letter-spacing:.2px}
    .card p{margin-top:12px;font-size:34px;line-height:1.45;color:var(--muted);min-height:112px}
    .path{display:inline-flex;margin-top:14px;border:2px solid var(--line);border-radius:13px;padding:6px 12px;font-size:26px;color:#335175;background:#f8fbff}

    .hidden{display:none}

    .footer{margin-top:28px;color:#74849d;font-size:22px}

    @media (max-width:1100px){
      .wrap{width:94vw}
      .hero h1{font-size:50px}
      .hero p{font-size:28px}
      .hero .meta{font-size:22px}
      .section-title{font-size:34px}
      .chip{font-size:19px}
      .grid{grid-template-columns:1fr}
      .card h3{font-size:34px}
      .card p{font-size:24px;min-height:auto}
      .tag,.path{font-size:18px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <h1>QianYuan1437 · 站点导航</h1>
      <p>一个入口，直达所有项目页面。主页按分组展示，并优先置顶推荐页面。</p>
      <div class="meta" id="hero-meta">共 0 个可用页面 · 最近生成 --</div>
    </header>

    <section class="section">
      <div class="section-title">⭐ 置顶推荐</div>
      <div class="grid" id="featured-grid"></div>
    </section>

    <section class="section">
      <div class="section-title">🧭 全部页面</div>
      <div class="chips" id="chips"></div>
      <div class="grid" id="all-grid"></div>
    </section>

    <div class="footer">Last update: <span id="now"></span></div>
  </div>

  <script>
    const USER = 'QianYuan1437';

    // 手工置顶项（你可继续加）
    const MANUAL_PAGES = [
      {
        name: 'Arxiv每日更新',
        desc: '控制障碍函数（CBF）相关论文每日更新与分栏浏览。',
        url: 'https://qianyuan1437.github.io/ArxivCBF/',
        path: '/ArxivCBF/',
        type: '研究',
        icon: '🧠',
        badge: '追踪',
        featured: true
      },
      {
        name: 'GitHub仓库总览',
        desc: '查看我的所有公开仓库与持续更新项目。',
        url: 'https://github.com/QianYuan1437?tab=repositories',
        path: '/repositories/',
        type: '内容',
        icon: '📰',
        badge: '资讯站',
        featured: true
      },
      {
        name: 'CBF源码仓库',
        desc: 'ArxivCBF 的抓取、构建与自动更新源码。',
        url: 'https://github.com/QianYuan1437/ArxivCBF',
        path: '/ArxivCBF(repo)/',
        type: '工具',
        icon: '📊',
        badge: '数据看板',
        featured: true
      }
    ];

    const TYPE_STYLE = {
      '内容': { icon: '📰', badge: '资讯站' },
      '工具': { icon: '📊', badge: '数据看板' },
      '研究': { icon: '🧠', badge: '追踪' }
    };

    function inferType(repo){
      const t = `${repo.name} ${repo.description || ''}`.toLowerCase();
      if (/(tracker|arxiv|paper|research|robot|cbf|learning)/.test(t)) return '研究';
      if (/(monitor|tool|dashboard|script|sync|api)/.test(t)) return '工具';
      return '内容';
    }

    function repoToPage(repo){
      const type = inferType(repo);
      const sty = TYPE_STYLE[type];
      const isUserSiteRepo = repo.name.toLowerCase() === `${USER.toLowerCase()}.github.io`;
      const pageUrl = isUserSiteRepo
        ? `https://${USER.toLowerCase()}.github.io/`
        : `https://${USER.toLowerCase()}.github.io/${repo.name}/`;
      return {
        name: repo.name,
        desc: repo.description || '暂无仓库描述。',
        url: pageUrl,
        path: isUserSiteRepo ? '/' : `/${repo.name}/`,
        type,
        icon: sty.icon,
        badge: sty.badge,
        featured: false,
        updated_at: repo.updated_at
      };
    }

    function card(page){
      return `
      <a class="card" href="${page.url}" target="_blank" data-type="${page.type}">
        <div class="card-top">
          <span class="icon">${page.icon}</span>
          <span class="tag">${page.badge}</span>
        </div>
        <div class="card-body">
          <h3>${page.name}</h3>
          <p>${page.desc}</p>
          <span class="path">${page.path}</span>
        </div>
      </a>`;
    }

    function renderChips(types){
      const chips = document.getElementById('chips');
      const allTypes = ['全部', ...types];
      chips.innerHTML = allTypes.map((t,idx)=>`<button class="chip ${idx===0?'active':''}" data-type="${t}">${t}</button>`).join('');
      chips.addEventListener('click', (e)=>{
        const btn = e.target.closest('.chip');
        if(!btn) return;
        document.querySelectorAll('.chip').forEach(c=>c.classList.remove('active'));
        btn.classList.add('active');
        const type = btn.dataset.type;
        document.querySelectorAll('#all-grid .card').forEach(c=>{
          c.classList.toggle('hidden', type!=='全部' && c.dataset.type!==type);
        });
      });
    }

    async function load(){
      const featuredGrid = document.getElementById('featured-grid');
      const allGrid = document.getElementById('all-grid');
      let pages = [...MANUAL_PAGES];
      try{
        const url = `https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`;
        const res = await fetch(url, { headers:{ 'Accept':'application/vnd.github+json' } });
        if(res.ok){
          const repos = await res.json();
          const repoPages = repos
            .filter(r => !MANUAL_PAGES.some(p => p.name.toLowerCase() === r.name.toLowerCase()))
            .map(repoToPage);
          pages = pages.concat(repoPages);
        }
      }catch(err){/* ignore and fallback to manual cards */}

      const featured = pages.filter(p => p.featured);
      const normal = pages;

      featuredGrid.innerHTML = featured.map(card).join('');
      allGrid.innerHTML = normal.map(card).join('');

      const types = [...new Set(normal.map(p=>p.type))];
      renderChips(types);

      document.getElementById('hero-meta').textContent = `共 ${normal.length} 个可用页面 · 最近生成 ${new Date().toLocaleString()}`;
      document.getElementById('now').textContent = new Date().toLocaleString();
    }

    load();
  </script>
</body>
</html>
