<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QianYuan1437 | Projects</title>
  <style>
    :root{--bg:#f3f6fb;--card:#ffffff;--ink:#182336;--muted:#5f6b7c;--line:#d9e1ee;--accent:#1d4ed8}
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:Segoe UI,system-ui,-apple-system,sans-serif;background:radial-gradient(1200px 480px at 20% -10%,#dbe8ff 0%,transparent 55%),var(--bg);color:var(--ink)}
    .wrap{width:min(1100px,92vw);margin:0 auto}
    header{padding:56px 0 24px}
    h1{font-size:40px;line-height:1.1;letter-spacing:.2px}
    .sub{margin-top:12px;color:var(--muted);font-size:16px}
    .top-actions{display:flex;gap:10px;flex-wrap:wrap;margin-top:22px}
    .btn{display:inline-flex;align-items:center;justify-content:center;padding:10px 14px;border-radius:11px;border:1px solid var(--line);background:#fff;color:var(--ink);text-decoration:none;font-weight:600;font-size:14px}
    .btn.primary{background:var(--accent);border-color:var(--accent);color:#fff}
    .panel{background:var(--card);border:1px solid var(--line);border-radius:16px;padding:18px;box-shadow:0 8px 28px rgba(22,43,78,.06)}
    .panel + .panel{margin-top:14px}
    .sec-title{font-size:15px;font-weight:700;color:#30415c;margin-bottom:12px}
    .repos{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
    .repo{display:block;border:1px solid var(--line);border-radius:12px;padding:14px;text-decoration:none;background:#fff;color:inherit;transition:transform .16s ease,border-color .16s ease}
    .repo:hover{transform:translateY(-2px);border-color:#8ea6d6}
    .repo h3{font-size:16px;line-height:1.3}
    .repo p{margin-top:8px;font-size:13px;color:var(--muted);min-height:34px}
    .meta{margin-top:10px;font-size:12px;color:#6b7a90}
    .footer{padding:30px 0 45px;color:#7a8798;font-size:12px}
    .empty,.loading{padding:24px;border:1px dashed var(--line);border-radius:12px;color:var(--muted);text-align:center}
    @media(max-width:640px){h1{font-size:30px}}
  </style>
</head>
<body>
  <div class="wrap">
    <header>
      <h1>QianYuan1437 Projects</h1>
      <p class="sub">个人项目导航页（参考 zhaorunrunrun.github.io 的导航式展示）</p>
      <div class="top-actions">
        <a class="btn primary" href="https://github.com/QianYuan1437" target="_blank">GitHub Profile</a>
        <a class="btn" href="https://github.com/QianYuan1437?tab=repositories" target="_blank">All Repositories</a>
      </div>
    </header>

    <section class="panel">
      <div class="sec-title">Pinned / Highlighted</div>
      <div class="repos" id="highlighted"></div>
    </section>

    <section class="panel">
      <div class="sec-title">All Public Repositories</div>
      <div id="repos-container" class="loading">Loading repositories...</div>
    </section>

    <div class="footer">Last update: <span id="now"></span></div>
  </div>

  <script>
    const USER = 'QianYuan1437';
    const HIGHLIGHT = [
      'ArxivCBF',
      'QianYuan1437.github.io'
    ];

    const fmt = (iso) => {
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return '-';
      return d.toISOString().slice(0,10);
    };

    const card = (r) => `
      <a class="repo" href="${r.html_url}" target="_blank">
        <h3>${r.name}</h3>
        <p>${r.description ? r.description : 'No description.'}</p>
        <div class="meta">★ ${r.stargazers_count} · Updated ${fmt(r.updated_at)}</div>
      </a>`;

    async function loadRepos(){
      const container = document.getElementById('repos-container');
      const highlighted = document.getElementById('highlighted');
      try {
        const url = `https://api.github.com/users/${USER}/repos?per_page=100&sort=updated`;
        const res = await fetch(url, { headers: { 'Accept':'application/vnd.github+json' } });
        if(!res.ok) throw new Error(`GitHub API ${res.status}`);
        const repos = await res.json();

        const pinned = repos.filter(r => HIGHLIGHT.includes(r.name));
        highlighted.innerHTML = pinned.length ? pinned.map(card).join('') : '<div class="empty">No highlighted repositories yet.</div>';

        if(!repos.length){
          container.className = 'empty';
          container.textContent = 'No public repositories found.';
          return;
        }
        container.className = 'repos';
        container.innerHTML = repos.map(card).join('');
      } catch (e) {
        container.className = 'empty';
        container.textContent = `Failed to load repositories: ${e.message}`;
      }
    }

    document.getElementById('now').textContent = new Date().toLocaleString();
    loadRepos();
  </script>
</body>
</html>
