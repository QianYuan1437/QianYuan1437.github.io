<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QianYuan1437 · 站点导航</title>
  <style>
    :root{
      --bg:#eef3fb;
      --ink:#101c33;
      --muted:#5f7091;
      --line:#d5e0f2;
      --card:#ffffffd8;
      --navy:#112a5c;
      --hero-a:#198a8f;
      --hero-b:#2f93f2;
      --chip:#edf2fb;
      --chip-on:#132c61;
      --shadow:0 16px 40px rgba(31,56,103,.14);
      --radius:22px;
    }

    *{box-sizing:border-box}
    html,body{margin:0;padding:0}
    body{
      font-family:"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
      color:var(--ink);
      background:
        radial-gradient(1000px 520px at -15% -10%, #d9e9ff 0%, transparent 65%),
        radial-gradient(900px 500px at 115% -20%, #d4f3df 0%, transparent 65%),
        var(--bg);
      min-height:100vh;
    }

    .wrap{width:min(1200px,92vw);margin:0 auto;padding:34px 0 56px}
    .hero{
      background:linear-gradient(130deg,var(--hero-a),var(--hero-b));
      border-radius:30px;
      color:#f7fbff;
      padding:34px 34px 30px;
      box-shadow:0 20px 45px rgba(17,49,95,.25);
    }
    .hero-top{display:flex;align-items:center;gap:16px;justify-content:space-between}
    .hero-left{display:flex;align-items:center;gap:16px}
    .github-link{
      width:46px;height:46px;border-radius:50%;
      display:grid;place-items:center;
      background:#ffffff2b;border:1px solid #ffffff59;
      text-decoration:none;font-size:24px;
      backdrop-filter:blur(3px);
      transition:all .2s ease;
    }
    .github-link:hover{background:#ffffff4d;transform:scale(1.05)}
    .avatar{
      width:58px;height:58px;border-radius:50%;
      display:grid;place-items:center;
      background:#ffffff2b;border:1px solid #ffffff59;
      font-weight:800;font-size:20px;letter-spacing:.5px;
      backdrop-filter:blur(3px);
    }
    .hero h1{margin:0;font-size:42px;line-height:1.14;letter-spacing:.2px}
    .hero p{margin:14px 0 0;font-size:20px;line-height:1.55;opacity:.95}
    .hero .meta{margin-top:14px;font-size:16px;opacity:.9}

    .section{margin-top:30px}
    .section-title{font-size:30px;font-weight:800;letter-spacing:.2px}

    .toolbar{
      margin-top:14px;
      display:flex;flex-wrap:wrap;gap:10px;align-items:center;
    }
    .search{
      flex:1 1 280px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:12px;
      height:42px;
      padding:0 12px;
      font-size:15px;
      color:var(--ink);
      outline:none;
    }
    .search:focus{border-color:#9fb8e6;box-shadow:0 0 0 3px #aac4f133}

    .sort-wrap{
      position:relative;
      display:inline-flex;
      align-items:center;
      height:42px;
    }
    .sort-trigger{
      height:42px;
      padding:0 36px 0 14px;
      border:1px solid var(--line);
      border-radius:999px;
      background:#fff;
      font-size:14px;
      color:#1e345f;
      outline:none;
      cursor:pointer;
      min-width:130px;
      text-align:left;
    }
    .sort-trigger:focus-visible{
      border-color:#9fb8e6;
      box-shadow:0 0 0 3px #aac4f133;
    }
    .sort-wrap::after{
      content:"";
      position:absolute;
      right:14px;
      width:8px;
      height:8px;
      border-right:2px solid #5f78a3;
      border-bottom:2px solid #5f78a3;
      transform:rotate(45deg) translateY(-2px);
      pointer-events:none;
    }
    .sort-menu{
      position:absolute;
      top:calc(100% + 8px);
      left:0;
      width:180px;
      background:#fff;
      border:1px solid var(--line);
      border-radius:14px;
      box-shadow:0 14px 28px rgba(22,46,92,.14);
      padding:6px;
      display:none;
      z-index:20;
    }
    .sort-wrap.open .sort-menu{display:block}
    .sort-item{
      width:100%;
      border:none;
      background:transparent;
      border-radius:10px;
      padding:9px 10px;
      text-align:left;
      font-size:14px;
      color:#1e345f;
      cursor:pointer;
    }
    .sort-item:hover{background:#edf3ff}
    .sort-item.active{
      background:#132c61;
      color:#fff;
    }

    .chips{display:flex;gap:10px;flex-wrap:wrap}
    .chip{
      border:1px solid #cdd9ee;
      background:var(--chip);
      color:#27426c;
      border-radius:999px;
      padding:8px 14px;
      font-size:14px;
      font-weight:700;
      cursor:pointer;
      transition:all .2s ease;
    }
    .chip:hover{border-color:#adc2e6}
    .chip.active{background:var(--chip-on);color:#fff;border-color:var(--chip-on)}

    .grid{
      margin-top:14px;
      display:grid;
      gap:16px;
      grid-template-columns:repeat(3,minmax(0,1fr));
    }
    .card{
      display:flex;flex-direction:column;
      background:var(--card);
      border:1px solid var(--line);
      border-radius:var(--radius);
      overflow:hidden;
      text-decoration:none;color:inherit;
      box-shadow:var(--shadow);
      backdrop-filter:blur(5px);
      transition:transform .2s ease, box-shadow .2s ease, border-color .2s ease;
      min-height:230px;
    }
    .card:hover{
      transform:translateY(-4px);
      border-color:#a9bfe7;
      box-shadow:0 20px 36px rgba(28,53,98,.17);
    }
    .card-top{
      display:flex;align-items:center;justify-content:space-between;
      min-height:74px;
      padding:14px 16px;
      background:linear-gradient(90deg,#d8e9fb,#d5f1df);
      border-bottom:1px solid #d8e4f4;
    }
    .icon{font-size:28px}
    .tag{
      border:1px solid #a8c3e6;
      background:#f3f9ff;
      color:#2d5686;
      border-radius:999px;
      font-size:12px;
      font-weight:700;
      padding:4px 10px;
    }
    .card-body{padding:16px 16px 18px;display:flex;flex-direction:column;flex:1}
    .card h3{margin:0;font-size:26px;line-height:1.2}
    .desc{
      margin-top:10px;
      color:var(--muted);
      line-height:1.55;
      font-size:15px;
      flex:1;
    }
    .meta-line{
      margin-top:12px;
      display:flex;justify-content:space-between;align-items:center;gap:8px;
      color:#58729a;
      font-size:12px;
    }
    .path{
      display:inline-block;
      border:1px solid #cfdbef;
      background:#f8fbff;
      border-radius:10px;
      padding:4px 8px;
      color:#31527e;
    }
    .updated{white-space:nowrap}
    .hidden{display:none}
    .footer{margin-top:22px;color:#70809b;font-size:13px}

    @media (max-width:980px){
      .hero h1{font-size:34px}
      .hero p{font-size:17px}
      .grid{grid-template-columns:repeat(2,minmax(0,1fr))}
    }
    @media (max-width:720px){
      .wrap{width:94vw;padding-top:22px}
      .hero{padding:24px 20px}
      .hero-top{gap:12px}
      .avatar{width:46px;height:46px;font-size:16px}
      .hero h1{font-size:27px}
      .hero p{font-size:15px}
      .section-title{font-size:24px}
      .grid{grid-template-columns:1fr}
      .card h3{font-size:22px}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero">
      <div class="hero-top">
        <div class="hero-left">
          <div class="avatar">QY</div>
          <h1>QianYuan1437 · 站点导航</h1>
        </div>
        <a class="github-link" href="https://github.com/QianYuan1437?tab=repositories" target="_blank" title="查看所有GitHub仓库">
          <svg viewBox="0 0 16 16" width="24" height="24" fill="currentColor"><path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"></path></svg>
        </a>
      </div>
      <p>一个入口直达我的项目页面与仓库。支持分类筛选、关键词搜索与排序。</p>
      <div class="meta" id="hero-meta">共 0 个可用页面 · 最近生成 --</div>
    </header>

    <section class="section">
      <div class="section-title">⭐ 置顶推荐</div>
      <div class="grid" id="featured-grid"></div>
    </section>

    <section class="section">
      <div class="section-title">🧭 全部页面</div>
      <div class="toolbar">
        <input id="search" class="search" type="search" placeholder="搜索项目名或描述..." />
        <div class="sort-wrap" id="sortWrap">
          <button class="sort-trigger" id="sortTrigger" type="button">按最近更新</button>
          <div class="sort-menu" id="sortMenu">
            <button class="sort-item active" type="button" data-sort="updated">按最近更新</button>
            <button class="sort-item" type="button" data-sort="name">按名称</button>
          </div>
        </div>
        <div class="chips" id="chips"></div>
      </div>
      <div class="grid" id="all-grid"></div>
    </section>

    <div class="footer">Last update: <span id="now"></span></div>
  </div>

  <script>
    const USER = "QianYuan1437";
    const MANUAL_PAGES = [
      {
        name: "Arxiv每日更新",
        desc: "控制障碍函数（CBF）相关论文每日更新与分栏浏览。",
        url: "https://qianyuan1437.github.io/ArxivCBF/",
        path: "/ArxivCBF/",
        type: "研究",
        icon: "🧠",
        badge: "研究",
        featured: true,
        updated_at: new Date().toISOString(),
        isFork: false
      },
      {
        name: "osssync",
        desc: "对象存储同步工具，支持多种云存储服务间的文件同步。",
        url: "https://github.com/QianYuan1437/osssync",
        path: "/osssync/",
        type: "工具",
        icon: "🔧",
        badge: "工具",
        featured: true,
        updated_at: new Date().toISOString(),
        isFork: false
      },
      {
        name: "DOB-VS-ESO",
        desc: "DOB 与 ESO 相关项目页面导航。",
        url: "https://qianyuan1437.github.io/DOB-VS-ESO/",
        path: "/DOB-VS-ESO/",
        type: "研究",
        icon: "🧠",
        badge: "研究",
        featured: true,
        updated_at: new Date().toISOString(),
        isFork: false
      }
    ];

    const TYPE_STYLE = {
      "内容": { icon: "📰", badge: "内容" },
      "工具": { icon: "🔧", badge: "工具" },
      "研究": { icon: "🧠", badge: "研究" }
    };

    let allPages = [];
    let currentType = "全部";
    let currentOrigin = "全部";
    let currentSort = "updated";

    function inferType(repo){
      const t = `${repo.name} ${repo.description || ""}`.toLowerCase();
      if (/(tracker|arxiv|paper|research|robot|cbf|learning|control|dob|eso)/.test(t)) return "研究";
      if (/(monitor|tool|dashboard|script|sync|api|bot|oss)/.test(t)) return "工具";
      return "内容";
    }

    function repoToPage(repo){
      const type = inferType(repo);
      const sty = TYPE_STYLE[type];
      const isUserSiteRepo = repo.name.toLowerCase() === `${USER.toLowerCase()}.github.io`;
      const pageUrl = isUserSiteRepo
        ? `https://${USER.toLowerCase()}.github.io/`
        : `https://${USER.toLowerCase()}.github.io/${repo.name}/`;
      return {
        name: repo.name,
        desc: repo.description || "暂无仓库描述。",
        url: pageUrl,
        path: isUserSiteRepo ? "/" : `/${repo.name}/`,
        type: type,
        icon: sty.icon,
        badge: sty.badge,
        featured: false,
        updated_at: repo.pushed_at || repo.updated_at || new Date().toISOString(),
        isFork: repo.fork || false
      };
    }

    function fmtDate(iso){
      const d = new Date(iso);
      if (Number.isNaN(d.getTime())) return "--";
      return d.toLocaleDateString("zh-CN");
    }

    function escapeHtml(text){
      return String(text || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
    }

    function card(page){
      return `
      <a class="card" href="${escapeHtml(page.url)}" target="_blank" data-type="${escapeHtml(page.type)}">
        <div class="card-top">
          <span class="icon">${escapeHtml(page.icon)}</span>
          <span class="tag">${escapeHtml(page.badge)}</span>
        </div>
        <div class="card-body">
          <h3>${escapeHtml(page.name)}</h3>
          <div class="desc">${escapeHtml(page.desc)}</div>
          <div class="meta-line">
            <span class="path">${escapeHtml(page.path)}</span>
            <span class="updated">${fmtDate(page.updated_at)}</span>
          </div>
        </div>
      </a>`;
    }

    function renderChips(types){
      const chips = document.getElementById("chips");
      const allTypes = ["全部", ...types];
      const typeChips = allTypes.map((t, i) =>
        `<button class="chip ${i === 0 ? "active" : ""}" data-type="${t}" data-filter="type">${t}</button>`
      ).join("");
      const originChips = `<button class="chip active" data-origin="全部" data-filter="origin">全部</button><button class="chip" data-origin="原生" data-filter="origin">原生</button><button class="chip" data-origin="Fork" data-filter="origin">Fork</button>`;
      chips.innerHTML = typeChips + originChips;
    }

    function setupChipsListener(){
      const chips = document.getElementById("chips");
      chips.addEventListener("click", (e) => {
        const btn = e.target.closest(".chip");
        if (!btn) return;
        const filter = btn.dataset.filter;
        if (filter === "type"){
          chips.querySelectorAll('[data-filter="type"]').forEach(c => c.classList.remove("active"));
          btn.classList.add("active");
          currentType = btn.dataset.type;
        }else if (filter === "origin"){
          chips.querySelectorAll('[data-filter="origin"]').forEach(c => c.classList.remove("active"));
          btn.classList.add("active");
          currentOrigin = btn.dataset.origin;
        }
        renderAllGrid();
      });
    }

    function getFilteredPages(){
      const q = document.getElementById("search").value.trim().toLowerCase();
      const sort = currentSort;
      let list = allPages.filter(p => currentType === "全部" || p.type === currentType);
      if (currentOrigin === "原生"){
        list = list.filter(p => !p.isFork);
      }else if (currentOrigin === "Fork"){
        list = list.filter(p => p.isFork);
      }
      if (q){
        list = list.filter(p => (`${p.name} ${p.desc}`).toLowerCase().includes(q));
      }
      if (currentOrigin !== "全部"){
        if (sort === "name"){
          list.sort((a,b) => a.name.localeCompare(b.name, "zh-CN"));
        }else{
          list.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
        }
        return list;
      }
      const original = list.filter(p => !p.isFork);
      const forked = list.filter(p => p.isFork);
      if (sort === "name"){
        original.sort((a,b) => a.name.localeCompare(b.name, "zh-CN"));
        forked.sort((a,b) => a.name.localeCompare(b.name, "zh-CN"));
      }else{
        original.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
        forked.sort((a,b) => new Date(b.updated_at) - new Date(a.updated_at));
      }
      return [...original, ...forked];
    }

    function renderAllGrid(){
      const allGrid = document.getElementById("all-grid");
      allGrid.innerHTML = getFilteredPages().map(card).join("");
    }

    async function fetchAllRepos(user){
      const all = [];
      for (let page = 1; page <= 10; page++){
        const url = `https://api.github.com/users/${user}/repos?type=all&per_page=100&sort=updated&page=${page}`;
        const res = await fetch(url, { headers: { Accept: "application/vnd.github+json" } });
        if (!res.ok){
          throw new Error(`GitHub API error ${res.status}`);
        }
        const repos = await res.json();
        if (!Array.isArray(repos) || repos.length === 0){
          break;
        }
        all.push(...repos);
        if (repos.length < 100){
          break;
        }
      }

      const seen = new Set();
      return all.filter(repo => {
        const key = String(repo.id || repo.full_name || repo.name || "");
        if (!key || seen.has(key)) return false;
        seen.add(key);
        return true;
      });
    }

    async function load(){
      const featuredGrid = document.getElementById("featured-grid");
      let pages = [...MANUAL_PAGES];
      try{
        const repos = await fetchAllRepos(USER);
        const repoPages = repos
          .filter(r => !MANUAL_PAGES.some(p => p.name.toLowerCase() === r.name.toLowerCase()))
          .map(repoToPage);
        pages = pages.concat(repoPages);
      }catch(_err){
        // fallback to manual pages when network/API is unavailable
      }

      allPages = pages;
      console.log("总页面数:", allPages.length);
      console.log("原生仓库:", allPages.filter(p => !p.isFork).map(p => p.name));
      console.log("Fork仓库:", allPages.filter(p => p.isFork).map(p => p.name));
      const featured = allPages.filter(p => p.featured);
      featuredGrid.innerHTML = featured.map(card).join("");

      const types = [...new Set(allPages.map(p => p.type))];
      renderChips(types);
      setupChipsListener();
      renderAllGrid();

      const now = new Date().toLocaleString("zh-CN");
      document.getElementById("hero-meta").textContent = `共 ${allPages.length} 个可用页面 · 最近生成 ${now}`;
      document.getElementById("now").textContent = now;
    }

    const sortWrap = document.getElementById("sortWrap");
    const sortTrigger = document.getElementById("sortTrigger");
    const sortMenu = document.getElementById("sortMenu");

    sortTrigger.addEventListener("click", () => {
      sortWrap.classList.toggle("open");
    });

    sortMenu.addEventListener("click", (e) => {
      const btn = e.target.closest(".sort-item");
      if (!btn) return;
      currentSort = btn.dataset.sort;
      sortTrigger.textContent = btn.textContent;
      sortMenu.querySelectorAll(".sort-item").forEach(i => i.classList.remove("active"));
      btn.classList.add("active");
      sortWrap.classList.remove("open");
      renderAllGrid();
    });

    document.addEventListener("click", (e) => {
      if (!sortWrap.contains(e.target)) {
        sortWrap.classList.remove("open");
      }
    });

    document.getElementById("search").addEventListener("input", renderAllGrid);
    load();
  </script>
</body>
</html>
